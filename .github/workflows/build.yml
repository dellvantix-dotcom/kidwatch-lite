name: Build KidWatch APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ─────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Install Android SDK components ─────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── 4. Generate Gradle wrapper if missing ─────────────────
      - name: Generate Gradle wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating..."
            gradle wrapper --gradle-version 8.4 --distribution-type bin
          else
            echo "gradlew found"
          fi

      # ── 5. Make gradlew executable ────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 6. Cache Gradle ───────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. Show project structure for debugging ───────────────
      - name: Show project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== App folder ==="
          ls -la app/ || echo "No app folder"
          echo "=== Manifest check ==="
          cat app/src/main/AndroidManifest.xml | head -5 || echo "No manifest"

      # ── 8. Build Debug APK ────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info

      # ── 9. Upload APK artifact ────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KidWatch-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
